<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Supervielle - ¿Cuánto vas a transferirte?</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style data-purpose="custom-colors">
    :root {
      --brand-color: #b00d36;
      --bg-color: #fafafa;
      --text-dark: #333333;
      --text-gray: #666666;
      --border-gray: #e0e0e0;
    }
  </style>
</head>
<body class="bg-[var(--bg-color)] font-sans antialiased text-[var(--text-dark)] h-screen flex flex-col relative pb-safe">

  <!-- BEGIN: MainHeader -->
  <header class="pt-12 pb-4 px-4 flex flex-col items-center relative z-10">
    <!-- Top Status Bar Area (Mock) -->
    <div class="w-full flex justify-between items-center mb-6 px-2 text-sm font-medium">
      <div class="flex items-center gap-1">
        <span>17:01</span>
        <svg class="lucide lucide-wrench" fill="none" height="14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="14" xmlns="http://www.w3.org/2000/svg"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
      </div>
      <div class="flex items-center gap-1">
        <svg class="lucide lucide-cellular-signal-3" fill="none" height="14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="14" xmlns="http://www.w3.org/2000/svg"><path d="M2 20h.01"></path><path d="M7 20v-4"></path><path d="M12 20v-8"></path><path d="M17 20V8"></path></svg>
        <span>4G</span>
        <div class="flex items-center bg-gray-200 rounded-sm px-1 text-[10px]">48</div>
      </div>
    </div>
    <!-- Navigation and Account Info -->
    <div class="w-full flex items-start justify-between">
      <button id="btn-back" onclick="window.location.href='pantalla4.html'" class="text-gray-700 p-1 -ml-1">
        <svg class="lucide lucide-arrow-left" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
      </button>
      <div class="text-center flex-1">
        <p class="text-[11px] text-[var(--text-gray)] uppercase tracking-wider font-medium">CA ARS 178-6215110-2</p>
        <p id="account-balance" class="text-lg font-medium mt-0.5">$372.280</p>
      </div>
      <div class="w-8"></div>
    </div>
  </header>
  <!-- END: MainHeader -->

  <!-- BEGIN: MainContent -->
  <main class="flex-1 flex flex-col justify-center px-6 relative z-0 mt-[-10vh]">
    <!-- Question -->
    <h1 class="text-[22px] font-medium text-center text-gray-800 mb-8">
      ¿Cuánto vas a transferirte?
    </h1>
    <!-- Amount Input Display -->
    <div class="text-center mb-8 flex justify-center items-center">
      <span class="text-4xl text-gray-700 font-medium mr-2">$</span>
      <input id="input-amount" type="number" class="text-6xl text-gray-800 font-semibold bg-transparent border-none text-center focus:outline-none focus:ring-0 w-64 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" placeholder="0" min="1" step="any" autofocus/>
    </div>
    <!-- Divider -->
    <div class="h-px bg-gray-200 w-full mb-8"></div>
    <!-- Reference Input Area -->
    <div class="w-full">
      <label class="block text-sm text-[var(--text-gray)] mb-2" for="input-reference">Referencia (Opcional)</label>
      <input class="w-full border border-gray-300 rounded-lg py-3 px-4 text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-transparent placeholder-gray-400" id="input-reference" placeholder="Ej.: Cumple Agus" type="text"/>
    </div>
  </main>
  <!-- END: MainContent -->

  <!-- BEGIN: FooterAction -->
  <footer class="p-4 bg-[var(--bg-color)] pb-8">
    <button id="btn-continue" class="w-full bg-[var(--brand-color)] hover:bg-[#900a2c] text-white font-medium py-3.5 rounded-lg transition-colors text-[17px] opacity-50 cursor-not-allowed" disabled>
      Continuar
    </button>
  </footer>
  <!-- END: FooterAction -->

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const inputAmount = document.getElementById('input-amount');
      const inputRef = document.getElementById('input-reference');
      const btnContinue = document.getElementById('btn-continue');
      
      // Load previous values if available
      const savedAmount = localStorage.getItem('transfer_amount') || '';
      inputAmount.value = savedAmount;
      
      const savedRef = localStorage.getItem('transfer_reference') || '';
      inputRef.value = savedRef;
      
      // Validate amount and toggle button state
      const validate = () => {
        const val = parseFloat(inputAmount.value);
        if (!isNaN(val) && val > 0) {
          btnContinue.removeAttribute('disabled');
          btnContinue.className = "w-full bg-[var(--brand-color)] hover:bg-[#900a2c] text-white font-medium py-3.5 rounded-lg transition-colors text-[17px]";
        } else {
          btnContinue.setAttribute('disabled', 'true');
          btnContinue.className = "w-full bg-[var(--brand-color)] hover:bg-[#900a2c] text-white font-medium py-3.5 rounded-lg transition-colors text-[17px] opacity-50 cursor-not-allowed";
        }
      };
      
      inputAmount.addEventListener('input', validate);
      validate(); // run initial validation
      
      btnContinue.addEventListener('click', () => {
        const val = parseFloat(inputAmount.value);
        if (!isNaN(val) && val > 0) {
          localStorage.setItem('transfer_amount', val.toString());
          localStorage.setItem('transfer_reference', inputRef.value.trim());
          window.location.href = 'pantalla6.html';
        }
      });
    });
  </script>
</body>
</html>
