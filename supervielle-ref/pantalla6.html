<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Supervielle - Resumen de Transferencia</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fc;
    }
  </style>
  <style data-purpose="component-styles">
    .summary-card {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
  </style>
</head>
<body class="antialiased text-gray-800 min-h-screen flex flex-col items-center">

  <!-- BEGIN: MobileContainer -->
  <div class="w-full max-w-[414px] bg-[#f8f9fc] min-h-screen flex flex-col relative overflow-hidden shadow-2xl">
    
    <!-- BEGIN: StatusBar -->
    <div class="flex justify-between items-center px-6 pt-3 pb-2 text-black text-sm font-semibold bg-white">
      <div class="flex items-center gap-1">
        <span>17:01</span>
        <svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path clip-rule="evenodd" d="M3 6a3 3 0 013-3h12a3 3 0 013 3v12a3 3 0 01-3 3H6a3 3 0 01-3-3V6zm14.25 6a.75.75 0 01-.22.53l-2.25 2.25a.75.75 0 11-1.06-1.06l1.72-1.72-1.72-1.72a.75.75 0 111.06-1.06l2.25 2.25c.14.14.22.33.22.53zM8.28 9.22a.75.75 0 00-1.06 1.06l1.72 1.72-1.72 1.72a.75.75 0 101.06 1.06l2.25-2.25a.75.75 0 000-1.06l-2.25-2.25a.75.75 0 00-1.06 0z" fill-rule="evenodd"></path>
        </svg>
      </div>
      <div class="flex items-center gap-1 text-xs">
        <div class="flex items-end gap-[1px] h-3">
          <div class="w-[3px] bg-black h-[40%] rounded-sm"></div>
          <div class="w-[3px] bg-black h-[60%] rounded-sm"></div>
          <div class="w-[3px] bg-black h-[80%] rounded-sm"></div>
          <div class="w-[3px] bg-gray-300 h-[100%] rounded-sm"></div>
        </div>
        <span class="font-bold ml-1">4G</span>
        <div class="relative w-6 h-3 border border-black rounded-[4px] p-[1px] ml-1 flex items-center">
          <div class="bg-black h-full w-[48%] rounded-[2px]"></div>
          <span class="absolute text-[9px] w-full text-center mix-blend-difference text-white">48</span>
        </div>
      </div>
    </div>
    <!-- END: StatusBar -->

    <!-- BEGIN: TopNavigation -->
    <header class="flex justify-between items-center px-4 py-3 bg-white border-b border-gray-100">
      <button id="btn-back" onclick="window.location.href='pantalla5.html'" class="p-2 text-gray-700 hover:bg-gray-100 rounded-full transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
      <h1 class="text-lg font-medium text-gray-900">Resumen</h1>
      <button id="btn-close" onclick="window.location.href='pantalla1.html'" class="p-2 text-gray-700 hover:bg-gray-100 rounded-full transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
    </header>
    <!-- END: TopNavigation -->

    <!-- BEGIN: MainContent -->
    <main class="flex-grow px-4 pt-6 pb-24 overflow-y-auto">
      <!-- Summary Card -->
      <section class="bg-white rounded-2xl p-5 summary-card mb-6 border border-gray-50">
        <!-- Recipient Details -->
        <div class="mb-5 pb-5 border-b border-gray-100">
          <p class="text-sm text-gray-500 mb-3">Vas a transferirte a</p>
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0 border border-blue-100 overflow-hidden">
              <img alt="Mercado Libre Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFIiHwvFGppEbaiRD9A29fbpWoSrLd_HNN956QaK_U8NGtmEt0goredE_x2KLD9o_VmreFOmNKzaynks8cgcbhSgVwdk9iTjKmiC_OclO8K_hnyrd6P7lB9oSf6f2Oaeh_tZyRNXllxPWhCeCuK1PpdIX8OMx929q4ATmEdy901NZurKSRb7Nnsh1rMRGVfb0h1YVeXK68LZJSpkUhGbdJPM76g3HqVeee9CQmcgGw0ZIN3pqrAhzNks2M1U6e3SOHCShaTMNCHAE"/>
            </div>
            <div>
              <h2 id="summary-recipient-name" class="text-base font-medium text-gray-900">MERCADO LIBRE SRL</h2>
              <p id="summary-recipient-cvu" class="text-xs text-gray-500 mt-0.5">CVU: 0000003100001987951820</p>
            </div>
          </div>
        </div>
        <!-- Amount -->
        <div class="mb-5 pb-5 border-b border-gray-100">
          <p class="text-sm text-gray-500 mb-1">Monto</p>
          <p id="summary-amount" class="text-[28px] leading-tight font-semibold text-gray-900">$ 1</p>
        </div>
        <!-- Concept Dropdown -->
        <div class="mb-5 pb-5 border-b border-gray-100 flex justify-between items-center cursor-pointer">
          <div>
            <p class="text-sm text-gray-500 mb-1">Concepto</p>
            <p id="summary-reference" class="text-base text-gray-900">Varios</p>
          </div>
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.5 8.25l-7.5 7.5-7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <!-- Source Account -->
        <div>
          <p class="text-sm text-gray-500 mb-3">Desde la cuenta</p>
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center flex-shrink-0 border border-gray-100 overflow-hidden relative">
              <div class="w-5 h-5 absolute">
                <svg fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2L22 22H2L12 2Z" fill="#dc2626"></path>
                </svg>
              </div>
            </div>
            <div>
              <p class="text-sm text-gray-700">CA ARS 178-6215110-2</p>
              <p id="summary-balance" class="text-base font-medium text-gray-900 mt-0.5">$372.280</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <!-- END: MainContent -->

    <!-- BEGIN: BottomActionArea -->
    <div class="absolute bottom-0 left-0 w-full px-5 pb-8 pt-4 bg-gradient-to-t from-[#f8f9fc] via-[#f8f9fc] to-transparent z-10">
      <!-- Disclaimer Info -->
      <div class="flex items-center justify-center gap-2 mb-4 text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <p class="text-[15px]">Revisá que los datos sean correctos.</p>
      </div>
      <!-- Action Button -->
      <button id="btn-submit-transfer" class="w-full bg-[#B2133E] hover:bg-[#990f33] active:bg-[#800c2a] text-white text-base font-medium py-3.5 rounded-[12px] transition-colors shadow-sm">
        Transferir dinero
      </button>
    </div>
    <!-- END: BottomActionArea -->

  </div>
  <!-- END: MobileContainer -->

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Retrieve values from localStorage
      const name = localStorage.getItem('transfer_recipient_name') || 'MERCADO LIBRE SRL';
      const cvu = localStorage.getItem('transfer_recipient_cvu') || '0000003100001987951820';
      const amount = localStorage.getItem('transfer_amount') || '1';
      const reference = localStorage.getItem('transfer_reference') || '';
      
      // Update fields
      document.getElementById('summary-recipient-name').textContent = name;
      document.getElementById('summary-recipient-cvu').textContent = `CVU: ${cvu}`;
      document.getElementById('summary-amount').textContent = `$ ${amount}`;
      
      const referenceEl = document.getElementById('summary-reference');
      if (reference !== '') {
        referenceEl.textContent = `Varios (${reference})`;
      } else {
        referenceEl.textContent = 'Varios';
      }
      
      // Hook up transfer action
      document.getElementById('btn-submit-transfer').addEventListener('click', () => {
        window.location.href = 'pantalla7.html';
      });
    });
  </script>
</body>
</html>
