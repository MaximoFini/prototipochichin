<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Supervielle - ¿A quién vas a transferir?</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fb;
    }
  </style>
</head>
<body class="antialiased text-gray-800 min-h-screen flex justify-center">
  <!-- Mobile Container -->
  <div class="w-full max-w-md bg-[#f8f9fb] min-h-screen shadow-lg flex flex-col relative overflow-hidden">
    
    <!-- BEGIN: StatusBar -->
    <div class="flex justify-between items-center px-6 pt-4 pb-2 text-sm font-medium bg-transparent">
      <div class="flex items-center gap-1">
        <span>16:57</span>
        <i class="fa-solid fa-wrench text-xs"></i>
      </div>
      <div class="flex items-center gap-1.5">
        <i class="fa-solid fa-signal text-xs"></i>
        <span>4G</span>
        <div class="relative w-6 h-3 rounded border border-gray-800 flex items-center p-[1px]">
          <div class="bg-gray-800 h-full rounded-[1px] w-4/5"></div>
        </div>
      </div>
    </div>
    <!-- END: StatusBar -->

    <!-- BEGIN: Header -->
    <header class="flex items-center px-4 py-3">
      <button id="btn-back" onclick="window.location.href='pantalla3.html'" aria-label="Go back" class="p-2 -ml-2 text-gray-600 hover:text-gray-900 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
      <h1 class="flex-1 text-center text-[19px] font-medium text-gray-800 pr-8">
        ¿A quién vas a transferir?
      </h1>
    </header>
    <!-- END: Header -->

    <!-- BEGIN: MainContent -->
    <main class="flex-1 px-4 pt-6 pb-8">
      <!-- Search Input -->
      <div class="relative mb-8">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <input id="input-recipient" class="w-full pl-12 pr-4 py-4 bg-white border border-gray-200 rounded-xl text-base text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm" placeholder="Ingresá nombre, CBU, CVU o Alias" type="text" autofocus/>
      </div>

      <!-- Contacts Section -->
      <section>
        <h2 class="text-[15px] font-medium text-gray-500 mb-4 px-1">
          Agenda de contactos
        </h2>
        <!-- Empty State Card -->
        <div class="bg-white rounded-2xl p-8 flex flex-col items-center text-center shadow-sm border border-gray-100">
          <!-- Icon Container -->
          <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mb-5">
            <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
          <!-- Text Content -->
          <h3 class="text-lg font-semibold text-gray-800 mb-2">
            Aún no tenés contactos agendados
          </h3>
          <p class="text-[15px] text-gray-500 leading-relaxed px-2">
            Empezá a agendar contactos haciendo una nueva transferencia.
          </p>
        </div>
      </section>
    </main>
    <!-- END: MainContent -->

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('input-recipient');
      
      // Load previous search if any
      const savedRecipient = localStorage.getItem('transfer_recipient_search') || '';
      input.value = savedRecipient;

      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const value = input.value.trim();
          if (value !== '') {
            localStorage.setItem('transfer_recipient_search', value);
            // Default recipient data for demo
            localStorage.setItem('transfer_recipient_name', 'Máximo Fini');
            localStorage.setItem('transfer_recipient_cuit', '20-46765034-4');
            localStorage.setItem('transfer_recipient_bank', 'MERCADO LIBRE SRL');
            localStorage.setItem('transfer_recipient_cvu', '0000003100001987951820');
            window.location.href = 'pantalla4.html';
          }
        }
      });
    });
  </script>
</body>
</html>
